<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>思维导图</title>
  </head>
  <body>
    <main class="mind-map-app">
      <div id="mapHost" class="map-host" aria-label="思维导图编辑区域"></div>

      <header class="topbar">
        <div class="title-block">
          <a class="home-link" href="../../">首页</a>
          <h1>思维导图</h1>
        </div>

        <div class="toolbar" aria-label="思维导图工具栏">
          <button id="addNodeBtn" type="button" class="icon-button" aria-label="新建框" title="新建框 Alt+1">
            <span class="material-symbols-rounded" aria-hidden="true">activity_zone</span>
          </button>
          <button
            id="connectBtn"
            type="button"
            class="icon-button secondary"
            aria-label="画箭头"
            title="画箭头 Alt+2"
            aria-pressed="false"
          >
            <span class="material-symbols-rounded" aria-hidden="true">arrow_selector_tool</span>
          </button>
          <button id="saveBtn" type="button" class="icon-button secondary" aria-label="保存" title="保存 Ctrl+S">
            <span class="material-symbols-rounded" aria-hidden="true">save</span>
          </button>
          <button id="refreshBtn" type="button" class="icon-button secondary" aria-label="刷新" title="刷新">
            <span class="material-symbols-rounded" aria-hidden="true">refresh</span>
          </button>
          <button id="resetBtn" type="button" class="icon-button secondary" aria-label="复位" title="复位">
            <span class="material-symbols-rounded" aria-hidden="true">recenter</span>
          </button>
          <button id="settingsBtn" type="button" class="icon-button secondary" aria-label="设置" title="设置">
            <span class="material-symbols-rounded" aria-hidden="true">settings</span>
          </button>
        </div>
      </header>

      <section id="settingsPanel" class="settings-panel hidden">
        <label>
          GitHub 用户名
          <input id="ownerInput" />
        </label>

        <label>
          数据仓库名
          <input id="repoInput" value="my-dashboard-data" />
        </label>

        <label>
          分支
          <input id="branchInput" value="main" />
        </label>

        <label>
          数据文件路径
          <input id="pathInput" value="data/mind-map.json" />
        </label>

        <label>
          Fine-grained Token
          <input id="tokenInput" type="password" placeholder="github_pat_..." />
        </label>

        <div class="settings-actions">
          <button id="saveSettingsBtn" type="button">保存设置</button>
          <button id="clearSettingsBtn" type="button" class="danger secondary">
            清除本机设置
          </button>
        </div>
      </section>

      <p id="status" class="status" aria-live="polite"></p>

      <nav id="contextMenu" class="context-menu hidden" aria-label="对象菜单">
        <button id="contextDeleteBtn" type="button" class="danger">删除</button>
      </nav>
    </main>

    <script type="module" src="/src/mind-map/main.ts"></script>
  </body>
</html>
